# Copy this file to .streamlit/secrets.toml and fill in your credentials
# NEVER commit secrets.toml to version control

[google]
client_id = "your-google-client-id.apps.googleusercontent.com"
client_secret = "your-google-client-secret"
redirect_uri = "http://localhost:8501"  # Change to your Streamlit Cloud URL for production

[openrouter]
api_key = "your-openrouter-api-key"

[pagespeed]
api_key = ""  # Optional - works without key at lower rate limits
